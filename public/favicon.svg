<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Background circle with gradient -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1976d2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d47a1;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="url(#grad1)"/>

  <!-- Document stack representing collections -->
  <rect x="8" y="8" width="12" height="15" rx="1" fill="white" opacity="0.9"/>
  <rect x="9" y="7" width="12" height="15" rx="1" fill="white" opacity="0.7"/>
  <rect x="10" y="6" width="12" height="15" rx="1" fill="white"/>

  <!-- Lines representing text in the document -->
  <line x1="12" y1="10" x2="19" y2="10" stroke="#1976d2" stroke-width="0.8"/>
  <line x1="12" y1="12" x2="20" y2="12" stroke="#1976d2" stroke-width="0.8"/>
  <line x1="12" y1="14" x2="18" y2="14" stroke="#1976d2" stroke-width="0.8"/>

  <!-- Search/AI symbol -->
  <circle cx="18" cy="17" r="2.5" fill="none" stroke="#ff6b35" stroke-width="1.2"/>
  <line x1="20" y1="19" x2="21.5" y2="20.5" stroke="#ff6b35" stroke-width="1.2"/>
</svg>
