  <line x1="72" y1="72" x2="120" y2="72" stroke="#1976d2" stroke-width="4.8"/>
  <line x1="72" y1="84" x2="108" y2="84" stroke="#1976d2" stroke-width="4.8"/>

  <!-- Search/AI symbol -->
